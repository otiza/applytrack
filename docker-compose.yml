services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: applytrack
      POSTGRES_PASSWORD: applytrack
      POSTGRES_DB: applytrack
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U applytrack -d applytrack']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://167.86.106.55:5173}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      DATABASE_URL: postgresql://applytrack:applytrack@postgres:5432/applytrack?schema=public
      JWT_SECRET: docker-dev-secret-change-me
      JWT_EXPIRES_IN: 7d
    ports:
      - '3000:3000'
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  postgres_data:
